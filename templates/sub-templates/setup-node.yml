name: 'Setup Node.js Environment'
description: 'Reusable template for setting up Node.js with caching'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '18'
  node-version-file:
    description: 'File containing Node.js version (e.g., .nvmrc, package.json)'
    required: false
    default: ''
  cache:
    description: 'Dependency cache strategy (npm, yarn, pnpm)'
    required: false
    default: 'npm'
  working-directory:
    description: 'Working directory for Node.js setup'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version-file && '' || inputs.node-version }}
        node-version-file: ${{ inputs.node-version-file }}
        cache: ${{ inputs.cache }}
        cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        case "${{ inputs.cache }}" in
          "npm")
            npm ci
            ;;
          "yarn")
            yarn install --frozen-lockfile
            ;;
          "pnpm")
            pnpm install --frozen-lockfile
            ;;
          *)
            npm ci
            ;;
        esac