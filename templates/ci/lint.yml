name: Linting Pipeline

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        type: string
        default: '18'
      package-manager:
        description: 'Package manager (npm, yarn, pnpm)'
        type: string
        default: 'npm'
      working-directory:
        description: 'Working directory'
        type: string
        default: '.'
      eslint-command:
        description: 'ESLint command'
        type: string
        default: 'npm run lint'
      prettier-command:
        description: 'Prettier command'
        type: string
        default: 'npm run format:check'
      type-check-command:
        description: 'TypeScript type checking command'
        type: string
        default: 'npm run type-check'
      run-eslint:
        description: 'Whether to run ESLint'
        type: boolean
        default: true
      run-prettier:
        description: 'Whether to run Prettier'
        type: boolean
        default: true
      run-type-check:
        description: 'Whether to run TypeScript type checking'
        type: boolean
        default: false

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: ./templates/sub-templates/setup-node
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          working-directory: ${{ inputs.working-directory }}

      - name: Run ESLint
        if: ${{ inputs.run-eslint }}
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.eslint-command }}

      - name: Run Prettier check
        if: ${{ inputs.run-prettier }}
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.prettier-command }}

      - name: Run TypeScript type check
        if: ${{ inputs.run-type-check }}
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.type-check-command }}