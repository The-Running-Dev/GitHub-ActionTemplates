name: ✨ Feature Request
description: Suggest a new template or enhancement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please fill out the sections below.

  - type: dropdown
    id: type
    attributes:
      label: Feature Type
      description: What type of feature are you requesting?
      options:
        - New template for a framework/language
        - Enhancement to existing template
        - New sub-template/composite action
        - Documentation improvement
        - Example workflow
        - Other
    validations:
      required: true

  - type: input
    id: framework
    attributes:
      label: Framework/Language/Tool
      description: If applicable, what framework, language, or tool should this support?
      placeholder: e.g., Python, Django, Vue.js, Docker, Kubernetes

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of what you want to see added.
      placeholder: Describe the feature you'd like to see implemented.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: Describe the use case or problem this feature would address.

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you envision this feature working?
      placeholder: Describe how you think this should be implemented.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?

  - type: textarea
    id: examples
    attributes:
      label: Example Usage
      description: If applicable, show how this feature would be used
      render: yaml

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Are you willing to contribute to implementing this feature?
      options:
        - label: I'm willing to submit a pull request for this feature
          required: false